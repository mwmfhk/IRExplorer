<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>iOS Audio Diagnostic</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 1rem auto; padding: 0 1rem; }
  h1 { font-size: 1.1rem; }
  button { display: block; width: 100%; padding: 1rem; margin: 0.5rem 0; font-size: 1rem; background: #eee; border: 1px solid #999; border-radius: 6px; }
  button:active { background: #ccc; }
  .status { font-family: monospace; font-size: 0.75rem; white-space: pre-wrap; background: #f6f6f6; padding: 0.5rem; border-radius: 4px; margin: 0.5rem 0; min-height: 1.5em; }
  .row { display: flex; gap: 0.5rem; align-items: center; margin: 0.25rem 0; font-family: monospace; font-size: 0.8rem; }
  .label { flex: 1; }
  .heard button { width: 3rem; padding: 0.3rem; margin: 0; font-size: 0.8rem; }
  .ok { background: #c8f5c8 !important; }
  .no { background: #f5c8c8 !important; }
</style>
</head>
<body>
<h1>iOS Audio Diagnostic</h1>
<p style="font-size:0.85rem">Each button plays a 1-second 440 Hz tone using a different audio path. Tap each one and report which ones you hear. Volume should be at least 50%.</p>

<div class="status" id="status">Tap a button to begin.</div>

<button id="t1">Test 1: Plain oscillator (sync in click)</button>
<button id="t2">Test 2: Oscillator after resume()</button>
<button id="t3">Test 3: AudioBufferSource (silence-then-tone in buffer)</button>
<button id="t4">Test 4: Decode a tiny WAV then play it</button>
<button id="t5">Test 5: Reuse context — second tap</button>
<button id="t6">Test 6: BiquadFilter chain (mimics IR explorer EQ)</button>
<button id="t7">Test 7: ConvolverNode with tiny impulse</button>
<button id="t8">Test 8: Fresh AudioContext per call</button>
<button id="t9">Test 9: HTML5 &lt;audio&gt; element (data URL beep)</button>
<button id="t10">Test 10: HTML5 audio first, THEN Web Audio osc</button>

<hr>
<h2 style="font-size:0.9rem">Results — tap ✓ or ✗ for each:</h2>
<div id="results"></div>

<script>
let ctx = null;
const status = document.getElementById('status');
const results = document.getElementById('results');
const TESTS = ['t1','t2','t3','t4','t5','t6','t7','t8'];

function log(msg) { status.textContent = msg; }
function addState(label) {
  if (!ctx) return label;
  return label + `\nctx: state=${ctx.state} sr=${ctx.sampleRate} t=${ctx.currentTime.toFixed(3)} baseLat=${ctx.baseLatency?.toFixed?.(4) ?? '?'} outLat=${ctx.outputLatency?.toFixed?.(4) ?? '?'}`;
}

function recordResult(id, info) {
  let row = document.getElementById('r-' + id);
  if (!row) {
    row = document.createElement('div');
    row.id = 'r-' + id;
    row.className = 'row';
    row.innerHTML = `<span class="label">${id}: ${info}</span><span class="heard"><button data-y="${id}">✓</button><button data-n="${id}">✗</button></span>`;
    results.appendChild(row);
  } else {
    row.querySelector('.label').textContent = `${id}: ${info}`;
  }
}

results.addEventListener('click', e => {
  const y = e.target.dataset.y, n = e.target.dataset.n;
  if (y) { e.target.parentElement.parentElement.classList.add('ok'); e.target.parentElement.parentElement.classList.remove('no'); }
  if (n) { e.target.parentElement.parentElement.classList.add('no'); e.target.parentElement.parentElement.classList.remove('ok'); }
});

// Test 1: pure synchronous, no resume, no nothing.
document.getElementById('t1').addEventListener('click', () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const g = ctx.createGain(); g.gain.value = 0.1;
  osc.frequency.value = 440;
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 1);
  log(addState('Test 1 started'));
  recordResult('t1', 'plain osc, sync, no resume');
});

document.getElementById('t2').addEventListener('click', () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume().then(() => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain(); g.gain.value = 0.1;
    osc.frequency.value = 440;
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 1);
    log(addState('Test 2 (after resume) started'));
    recordResult('t2', 'osc after async resume()');
  }).catch(e => log('Test 2 resume err: ' + e.message));
});

document.getElementById('t3').addEventListener('click', () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  const N = ctx.sampleRate;
  const buf = ctx.createBuffer(1, N, ctx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < N; i++) ch[i] = 0.1 * Math.sin(2*Math.PI*440*i/ctx.sampleRate);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.connect(ctx.destination); src.start();
  log(addState('Test 3 (buffer source) started'));
  recordResult('t3', 'AudioBufferSource sine');
});

document.getElementById('t4').addEventListener('click', async () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  try {
    // Build a tiny WAV in memory: 1s of 440Hz sine at 44.1kHz
    const sr = 44100, N = sr;
    const data = new Int16Array(N);
    for (let i = 0; i < N; i++) data[i] = Math.round(0.1 * 32767 * Math.sin(2*Math.PI*440*i/sr));
    const ab = new ArrayBuffer(44 + data.byteLength);
    const dv = new DataView(ab);
    const wr = (off, s) => { for (let i=0;i<s.length;i++) dv.setUint8(off+i, s.charCodeAt(i)); };
    wr(0, 'RIFF'); dv.setUint32(4, 36 + data.byteLength, true);
    wr(8, 'WAVE'); wr(12, 'fmt '); dv.setUint32(16, 16, true);
    dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
    dv.setUint32(24, sr, true); dv.setUint32(28, sr*2, true);
    dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
    wr(36, 'data'); dv.setUint32(40, data.byteLength, true);
    new Int16Array(ab, 44).set(data);
    const decoded = await new Promise((res, rej) => ctx.decodeAudioData(ab, res, rej));
    const src = ctx.createBufferSource();
    src.buffer = decoded; src.connect(ctx.destination); src.start();
    log(addState(`Test 4 ok: decoded sr=${decoded.sampleRate} ch=${decoded.numberOfChannels} dur=${decoded.duration.toFixed(2)}`));
    recordResult('t4', `decoded WAV @ ${decoded.sampleRate}`);
  } catch (e) {
    log('Test 4 err: ' + e.message);
    recordResult('t4', 'decoded WAV — ERROR: ' + e.message);
  }
});

let t5Count = 0;
document.getElementById('t5').addEventListener('click', () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  t5Count++;
  const osc = ctx.createOscillator();
  const g = ctx.createGain(); g.gain.value = 0.1;
  osc.frequency.value = 440 + t5Count*50;
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 1);
  log(addState(`Test 5 tap #${t5Count} freq=${440+t5Count*50}`));
  recordResult('t5', `reuse ctx, tap #${t5Count}`);
});

document.getElementById('t6').addEventListener('click', () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const g = ctx.createGain(); g.gain.value = 0.1;
  const low = ctx.createBiquadFilter(); low.type = 'lowshelf'; low.frequency.value = 200; low.gain.value = 0;
  const mid = ctx.createBiquadFilter(); mid.type = 'peaking';  mid.frequency.value = 800; mid.Q.value = 0.9; mid.gain.value = 0;
  const hi  = ctx.createBiquadFilter(); hi.type  = 'highshelf'; hi.frequency.value = 3200; hi.gain.value = 0;
  osc.frequency.value = 440;
  osc.connect(g); g.connect(low); low.connect(mid); mid.connect(hi); hi.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 1);
  log(addState('Test 6 (EQ chain) started'));
  recordResult('t6', 'osc → 3 biquad EQ → dest');
});

document.getElementById('t7').addEventListener('click', () => {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  const N = ctx.sampleRate;
  const sineBuf = ctx.createBuffer(1, N, ctx.sampleRate);
  const sineCh = sineBuf.getChannelData(0);
  for (let i = 0; i < N; i++) sineCh[i] = 0.1 * Math.sin(2*Math.PI*440*i/ctx.sampleRate);
  const impulse = ctx.createBuffer(1, 64, ctx.sampleRate);
  impulse.getChannelData(0)[0] = 1.0;
  const conv = ctx.createConvolver(); conv.normalize = false; conv.buffer = impulse;
  const src = ctx.createBufferSource(); src.buffer = sineBuf;
  src.connect(conv); conv.connect(ctx.destination); src.start();
  log(addState('Test 7 (convolver, dirac impulse) started'));
  recordResult('t7', 'BufSrc → ConvNode(dirac) → dest');
});

document.getElementById('t8').addEventListener('click', () => {
  const c = new (window.AudioContext || window.webkitAudioContext)();
  const osc = c.createOscillator();
  const g = c.createGain(); g.gain.value = 0.1;
  osc.frequency.value = 440;
  osc.connect(g); g.connect(c.destination);
  osc.start(); osc.stop(c.currentTime + 1);
  log(`Test 8 (fresh ctx) started\nfresh: state=${c.state} sr=${c.sampleRate} t=${c.currentTime.toFixed(3)}`);
  recordResult('t8', `fresh ctx every tap, sr=${c.sampleRate}`);
});

// Build a 1s 440Hz sine WAV as a data: URL once
function buildBeepDataUrl() {
  const sr = 44100, N = sr;
  const data = new Int16Array(N);
  for (let i = 0; i < N; i++) data[i] = Math.round(0.2 * 32767 * Math.sin(2*Math.PI*440*i/sr));
  const ab = new ArrayBuffer(44 + data.byteLength);
  const dv = new DataView(ab);
  const wr = (off, s) => { for (let i=0;i<s.length;i++) dv.setUint8(off+i, s.charCodeAt(i)); };
  wr(0, 'RIFF'); dv.setUint32(4, 36 + data.byteLength, true);
  wr(8, 'WAVE'); wr(12, 'fmt '); dv.setUint32(16, 16, true);
  dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
  dv.setUint32(24, sr, true); dv.setUint32(28, sr*2, true);
  dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
  wr(36, 'data'); dv.setUint32(40, data.byteLength, true);
  new Int16Array(ab, 44).set(data);
  let bin = ''; const u8 = new Uint8Array(ab);
  for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
  return 'data:audio/wav;base64,' + btoa(bin);
}
const BEEP_URL = buildBeepDataUrl();

document.getElementById('t9').addEventListener('click', () => {
  const a = new Audio(BEEP_URL);
  a.play().then(() => {
    log('Test 9 (HTML5 audio) play() resolved');
    recordResult('t9', 'HTML5 <audio> data URL beep');
  }).catch(e => {
    log('Test 9 play err: ' + e.message);
    recordResult('t9', 'HTML5 <audio> ERR: ' + e.message);
  });
});

document.getElementById('t10').addEventListener('click', () => {
  const a = new Audio(BEEP_URL);
  a.play().then(() => {
    // After HTML5 audio claims the session, start a Web Audio osc
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    setTimeout(() => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain(); g.gain.value = 0.1;
      osc.frequency.value = 660;
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 1);
      log(addState('Test 10: HTML5 beep then 660Hz osc'));
    }, 200);
    recordResult('t10', 'HTML5 beep, then Web Audio osc 660Hz');
  }).catch(e => {
    log('Test 10 err: ' + e.message);
    recordResult('t10', 'Test 10 ERR: ' + e.message);
  });
});
</script>
</body>
</html>
